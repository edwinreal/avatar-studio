services:
  mongodb:
    image: mongo:7-jammy
    container_name: avatar-studio-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: avatar_studio
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: avatar-studio-queue
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-01-05T06-17-54Z
    container_name: avatar-studio-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mongo_data:
  minio_data:
