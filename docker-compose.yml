services:
  postgres:
    image: postgres:16-alpine
    container_name: avatar-studio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: avatar_studio
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: avatar-studio-queue
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-01-05T06-17-54Z
    container_name: avatar-studio-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
