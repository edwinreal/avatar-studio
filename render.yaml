services:
  - type: web
    name: synapse-studios-api
    env: node
    plan: free
    buildCommand: "npm install && npm run build -w @studio/api"
    startCommand: "npm run start -w @studio/api"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "10000"
